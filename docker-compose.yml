services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: duetracker
      POSTGRES_PASSWORD: duetracker
      POSTGRES_DB: duetracker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duetracker -d duetracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_URL: http://localhost:4000
      CLIENT_ORIGIN: http://localhost:4000
      DATABASE_URL: postgresql://duetracker:duetracker@postgres:5432/duetracker?schema=public
      JWT_SECRET: replace-this-with-a-production-secret
      SMTP_FROM: DueTracker <no-reply@duetracker.local>
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads

volumes:
  postgres-data:
  uploads:
